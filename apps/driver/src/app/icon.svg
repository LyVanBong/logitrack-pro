<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient mapping from slate-900 to blue-900 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <!-- Background grid mesh to align with ERP icon style -->
    <pattern id="grid" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M 6 0 L 0 0 0 6" fill="none" stroke="white" stroke-width="0.5" opacity="0.2" />
    </pattern>
  </defs>

  <!-- Container Box with Border Radius -->
  <rect width="64" height="64" rx="16" fill="url(#bg)" />
  <rect width="64" height="64" rx="16" fill="url(#grid)" />
  
  <!-- T&T Vector Text -->
  <text x="32" y="36.5" fill="white" font-size="26" font-weight="900" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" text-anchor="middle" dominant-baseline="middle" letter-spacing="-1">
    T<tspan fill="#f97316">&amp;</tspan>T
  </text>
</svg>
